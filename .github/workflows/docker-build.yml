name: Build and Push Docker Image

on:
  push:
    branches: [master]
    paths:
      - 'Dockerfile'
      - 'pipeline.py'
      - 'handler.py'
      - 'requirements.txt'
  workflow_dispatch:  # manualne spustenie z GitHub UI

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: vlador666/dubbing:latest
          cache-from: type=registry,ref=vlador666/dubbing:buildcache
          cache-to: type=registry,ref=vlador666/dubbing:buildcache,mode=max
